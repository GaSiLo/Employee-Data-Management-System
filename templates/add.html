<html>
    <head>
        <title>Add Employee</title>
    </head>
    <body>
        <h2>Add Employee</h2>
        <hr>
       {% with messages = get_flashed_messages() %}
  {% if messages %}
    {% for message in messages %}
      <p ><b>{{ message }}</b></p>
    {% endfor %}
  {% endif %}
{% endwith %}
        <form method="POST">
            <label>Emp Id:</label>
            <input type="number" name="emp_id" required><br><br>

            <label>Name:</label>
            <input type="text" name="name" required><br><br>
            
            <label>Email:</label>
            <input type="email" name="email" required><br><br>
            
            <label>Age:</label>
            <input type="number" name="age" ><br><br>
            
            <label>Gender:</label>
            <select name="gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>    
            </select><br><br>

            <label>Marital Status:</label>
            <select name="marital_status">
                <option value="Single">Single</option>
                <option value="Married">Married</option>    
            </select><br><br>

            <label>Department:</label>
            <input type="text" name="department" ><br><br>

            <label>Job Role:</label>
            <input type="text" name="job_role" ><br><br>

            <label>Salary:</label>
            <input type="number" name="salary" step="'0.01"><br><br>

            <label>Experience:</label>
            <input type="number" name="experience" ><br><br>

            <label>Job Level:</label>
            <input type="number" name="job_level" ><br><br>

            <button type="submit">Insert Employee</button>
            
    <a href="/">
        <button type="button">
            Back 
        </button>
    </a>

            
        </form>
    </body>
</html>
